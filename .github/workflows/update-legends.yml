name: Update legends snapshot

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-legends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Regenerate data/legends.json
        env:
          GITHUB_TOKEN: ${{ secrets.LEGENDS_GITHUB_TOKEN }}
        run: node -r ./scripts/stub-server-only.cjs --import tsx scripts/build-legends.ts

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update legends snapshot [skip ci]"
          file_pattern: "data/legends.json lib/achievementRarity.json"
